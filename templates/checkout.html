{% extends "base.html" %}
{% block title %}Checkout — TradeFlow{% endblock %}

{% block content %}
<section class="page-hero">
    <h1>Checkout</h1>
    <p>Complete your order securely</p>
</section>

<section class="section checkout-page">
    <form id="checkout-form" class="checkout-form">
        <div class="checkout-grid">
            <div class="checkout-main">
                <div class="glass-card checkout-block">
                    <h3>Billing Details</h3>
                    <div class="form-grid">
                        <input type="text" name="first_name" placeholder="First Name" required>
                        <input type="text" name="last_name" placeholder="Last Name" required>
                        <input type="email" name="email" placeholder="Email" required class="span-2">
                        <input type="tel" name="phone" placeholder="Phone" required class="span-2">
                        <input type="text" name="address" placeholder="Street Address" required class="span-2">
                        <input type="text" name="city" placeholder="City" required>
                        <input type="text" name="zip" placeholder="ZIP Code" required>
                    </div>
                </div>

                <div class="glass-card checkout-block">
                    <h3>Shipping Information</h3>
                    <div class="form-grid">
                        <label class="checkbox-label span-2">
                            <input type="checkbox" id="same-as-billing" checked> Same as billing address
                        </label>
                        <input type="text" name="ship_address" placeholder="Shipping Address" class="span-2 ship-field">
                        <input type="text" name="ship_city" placeholder="City" class="ship-field">
                        <input type="text" name="ship_zip" placeholder="ZIP" class="ship-field">
                    </div>
                </div>

                <div class="glass-card checkout-block">
                    <h3>Payment Method</h3>
                    <div class="payment-options">
                        <label class="payment-option"><input type="radio" name="payment" value="cod" checked> Cash on Delivery</label>
                        <label class="payment-option"><input type="radio" name="payment" value="card"> Credit / Debit Card</label>
                        <label class="payment-option"><input type="radio" name="payment" value="bank"> Online Banking</label>
                    </div>
                </div>
            </div>

            <aside class="checkout-sidebar">
                <div class="order-summary glass-card">
                    <h3>Order Summary</h3>
                    <div id="checkout-items"></div>
                    <div class="summary-row"><span>Subtotal</span><span id="co-subtotal">PKR 0</span></div>
                    <div class="summary-row"><span>Tax (17%)</span><span id="co-tax">PKR 0</span></div>
                    <div class="summary-row total"><span>Total</span><span id="co-total">PKR 0</span></div>
                    <button type="submit" class="btn btn-primary btn-block">Place Order</button>
                    <p id="checkout-status" class="status-text"></p>
                </div>
            </aside>
        </div>
    </form>
</section>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener("DOMContentLoaded", () => TradeFlow.initCheckoutPage());
</script>
{% endblock %}
